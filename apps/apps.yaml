---
hvac_app:
  module: hvac_app
  class: HvacApp
  log_level: !secret hvac_log_level
  constrain_input_boolean: input_boolean.heat_pump_automation_enabled
solar_app:
  module: solar_app
  class: SolarApp
  log_level: !secret solar_log_level
  constrain_input_boolean: input_boolean.solar_automation_enabled
